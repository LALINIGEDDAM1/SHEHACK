services:
  - type: web
    name: question-generator-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
    disks:
      - name: uploads
        mountPath: /app/uploads
        sizeGB: 1
